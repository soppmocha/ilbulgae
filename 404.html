<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리다이렉트 중...</title>
    <script>
        // 현재 접속한 주소의 도메인(예: 유저이름.github.io) 뒤에 붙은 전체 경로를 확인합니다.
        const path = window.location.pathname;

        // 만약 사용자가 잘못된 주소로 들어오거나 새로고침을 해서 404가 떴다면,
        // 무조건 안전한 메인 홈 주소로 강제 이동시킵니다.
        // GitHub Pages 환경(/ilbulgae)과 로컬 환경(localhost) 모두 대응합니다.
        if (path.includes('/ilbulgae')) {
            window.location.replace('/ilbulgae/home');
        } else {
            window.location.replace('/home');
        }
    </script>
</head>
<body>
</body>
</html>
